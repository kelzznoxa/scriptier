<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA SENSI AI PRO - KAREEMXD</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #00ffcc; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px #00ffcc; width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 10px; border: none; background: #222; color: white; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #008877; color: white; }
        #result { margin-top: 20px; text-align: left; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌌 OMEGA SENSI AI 🌌</h2>
        <p><i>Sultan KareemXD Edition</i></p>
        <input type="text" id="hp" placeholder="Tipe HP (Contoh: S25 Ultra)">
        <button onclick="getSensi()">EKSEKUSI AI</button>
        <div id="result"></div>
    </div>

    <script>
        async function getSensi() {
            const device = document.getElementById('hp').value;
            if(!device) return alert("Masukkan tipe HP, Yang Mulia!");
            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({device: device})
            });
            const data = await res.json();
            document.getElementById('result').innerHTML = `
                <hr>
                <b>GEN:</b> ${data.settings.general} | <b>RED:</b> ${data.settings.red_dot}<br>
                <b>2X:</b> ${data.settings.scope2x} | <b>4X:</b> ${data.settings.scope4x}<br>
                <b>DPI:</b> ${data.settings.dpi} | <b>BUTTON:</b> ${data.settings.button_size}<br>
                <p style="color: yellow;">${data.advice}</p>
                <small style="color: grey;">Status: ${data.settings.accuracy}</small>
            `;
        }
    </script>
</body>
</html>
